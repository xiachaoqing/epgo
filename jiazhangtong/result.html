<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>支付结果 - 英语陪跑GO</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Helvetica Neue",Arial,sans-serif;background:#f7f9fc;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:20px;padding:40px 32px;max-width:420px;width:100%;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,0.08)}
.icon{font-size:4rem;margin-bottom:20px}
h1{font-size:1.5rem;font-weight:700;color:#1a1a2e;margin-bottom:10px}
p{color:#666;font-size:.95rem;line-height:1.7;margin-bottom:6px}
.account-box{background:#f0f9ff;border-radius:12px;padding:20px;margin:24px 0;text-align:left}
.account-box .row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #e0f0fa}
.account-box .row:last-child{border:none}
.account-box .label{color:#888;font-size:.85rem}
.account-box .value{font-weight:700;color:#1a1a2e;font-size:.95rem}
.copy-btn{background:#e8f4fd;color:#4E97D9;border:none;padding:4px 12px;border-radius:8px;font-size:.8rem;cursor:pointer}
.copy-btn:active{background:#4E97D9;color:#fff}
.btn-home{display:block;margin-top:20px;background:#4E97D9;color:#fff;padding:14px;border-radius:12px;font-size:1rem;font-weight:600;text-decoration:none;transition:background .2s}
.btn-home:hover{background:#3a7abf}
.btn-retry{display:block;margin-top:12px;border:2px solid #4E97D9;color:#4E97D9;padding:12px;border-radius:12px;font-size:.95rem;font-weight:600;background:none;cursor:pointer;width:100%}
.status-pending{color:#ff9500}
.status-paid{color:#34C759}
.spinner{display:inline-block;width:20px;height:20px;border:3px solid #eee;border-top-color:#4E97D9;border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card" id="card">
  <div class="icon" id="icon">⏳</div>
  <h1 id="title">查询支付结果中...</h1>
  <p id="desc"><span class="spinner"></span>正在确认您的支付状态，请稍候</p>
  <div id="accountBox" style="display:none" class="account-box"></div>
  <div id="actions"></div>
</div>

<script>
const API_BASE = 'https://wechat.xiachaoqing.com';
const urlParams = new URLSearchParams(window.location.search);
const orderNo   = urlParams.get('order') || sessionStorage.getItem('jzt_order_no');

let pollCount = 0;

async function queryStatus() {
  if (!orderNo) {
    showError('未找到订单信息，请返回重试');
    return;
  }
  try {
    const resp = await fetch(`${API_BASE}/api/jzt/order/status?order_no=${orderNo}`);
    const data = await resp.json();

    if (data.status === 'paid') {
      showSuccess(data);
    } else if (data.status === 'activating' || data.status === 'paid') {
      showActivating();
      // 最多轮询3次（30秒），之后直接显示等待通知
      if (pollCount++ < 3) {
        setTimeout(queryStatus, 10000);
      }
    } else {
      // pending：可能还没回调，等一等
      if (pollCount++ < 6) {
        setTimeout(queryStatus, 5000);
      } else {
        showPending();
      }
    }
  } catch(e) {
    if (pollCount++ < 3) {
      setTimeout(queryStatus, 5000);
    } else {
      showError('网络错误，请刷新页面重试');
    }
  }
}

function showSuccess(data) {
  document.getElementById('icon').textContent = '🎉';
  document.getElementById('title').textContent = '开通成功！';
  document.getElementById('desc').innerHTML = `
    <span style="color:#34C759;font-weight:600">¥ 支付成功</span>，家长通账号已为您开通！<br>
    请妥善保存以下账号信息。
  `;
  const box = document.getElementById('accountBox');
  box.style.display = 'block';
  box.innerHTML = `
    <div class="row">
      <span class="label">套餐</span>
      <span class="value">${data.plan || ''}</span>
    </div>
    <div class="row">
      <span class="label">家长通账号</span>
      <span class="value">${data.account}</span>
      <button class="copy-btn" onclick="copyText('${data.account}')">复制</button>
    </div>
    <div class="row">
      <span class="label">密码</span>
      <span class="value">${data.password}</span>
      <button class="copy-btn" onclick="copyText('${data.password}')">复制</button>
    </div>
    <div class="row">
      <span class="label">有效期至</span>
      <span class="value">${data.expire_at ? data.expire_at.substring(0,10) : ''}</span>
    </div>
  `;
  document.getElementById('actions').innerHTML = `
    <a class="btn-home" href="/jiazhangtong/">返回家长通介绍页</a>
    <p style="margin-top:14px;font-size:.8rem;color:#aaa">账号信息已发送至您的手机，请查收短信</p>
  `;
}

function showActivating() {
  document.getElementById('icon').textContent = '✅';
  document.getElementById('title').textContent = '支付成功！';
  document.getElementById('desc').innerHTML = `
    账号正在人工开通，<strong>预计10分钟内</strong>完成。<br>
    开通后将通过<strong>公众号消息</strong>通知您，请关注「夏超青」公众号。
  `;
  document.getElementById('actions').innerHTML = `
    <a class="btn-home" href="/jiazhangtong/#qr" style="background:#07c160">关注公众号 · 接收账号通知</a>
    <button class="btn-retry" onclick="queryStatus()" style="margin-top:12px">刷新查询</button>
    <a class="btn-home" href="/jiazhangtong/" style="margin-top:12px;background:#4E97D9">返回首页</a>
  `;
}

function showTimeout() {
  document.getElementById('icon').textContent = '📱';
  document.getElementById('title').textContent = '账号开通中';
  document.getElementById('desc').innerHTML = `
    支付已成功，账号开通需要一点时间。<br>
    我们会尽快处理，<strong>请添加客服微信</strong>，发送您的手机号获取账号。
  `;
  document.getElementById('actions').innerHTML = `
    <a class="btn-home" href="/jiazhangtong/#qr">联系客服获取账号</a>
    <button class="btn-retry" onclick="location.reload()">刷新查询</button>
  `;
}

function showPending() {
  document.getElementById('icon').textContent = '⚠️';
  document.getElementById('title').textContent = '支付确认中';
  document.getElementById('desc').innerHTML = `
    未查询到支付结果，可能网络延迟，请稍后刷新。<br>
    如已完成支付请联系客服处理。
  `;
  document.getElementById('actions').innerHTML = `
    <button class="btn-retry" onclick="queryStatus()">重新查询</button>
    <a class="btn-home" href="/jiazhangtong/" style="margin-top:12px">返回首页</a>
  `;
}

function showError(msg) {
  document.getElementById('icon').textContent = '❌';
  document.getElementById('title').textContent = '出现错误';
  document.getElementById('desc').textContent = msg;
  document.getElementById('actions').innerHTML = `
    <button class="btn-retry" onclick="location.reload()">刷新重试</button>
    <a class="btn-home" href="/jiazhangtong/" style="margin-top:12px">返回首页</a>
  `;
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => {
    alert('已复制：' + text);
  }).catch(() => {
    prompt('请手动复制：', text);
  });
}

// 启动查询
queryStatus();
</script>
</body>
</html>
